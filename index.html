<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamerCore Manager</title>
<style>
/* ======================================================
   CSS VARIABLES — MODO OSCURO / CLARO
====================================================== */
:root[data-theme="dark"]{
  --bg-main:       linear-gradient(135deg,#000000,#120000,#1f0000);
  --bg-radial:     rgba(255,0,0,0.15);
  --bg-panel:      rgba(15,15,15,0.95);
  --bg-panel2:     rgba(10,10,10,0.95);
  --bg-item:       rgba(30,0,0,0.8);
  --bg-input:      #111;
  --border-main:   red;
  --border-soft:   #550000;
  --border-mid:    #880000;
  --text-main:     white;
  --text-result:   #ff4d4d;
  --text-label:    red;
  --text-sub:      #aaa;
  --text-muted:    #555;
  --text-date:     #666;
  --btn-grad:      linear-gradient(45deg,#ff0000,#990000);
  --btn-hist:      linear-gradient(45deg,#330000,#220000);
  --btn-load:      linear-gradient(45deg,#880000,#440000);
  --btn-del:       rgba(60,0,0,0.8);
  --shadow-main:   rgba(255,0,0,0.4);
  --shadow-panel:  rgba(255,0,0,0.3);
  --shadow-result: rgba(255,0,0,0.25);
  --scrollbar:     red;
  --toggle-bg:     #330000;
}
:root[data-theme="light"]{
  --bg-main:       linear-gradient(135deg,#f5f0f0,#ffe8e8,#fff0f0);
  --bg-radial:     rgba(200,0,0,0.08);
  --bg-panel:      rgba(255,255,255,0.97);
  --bg-panel2:     rgba(255,252,252,0.97);
  --bg-item:       rgba(255,240,240,0.9);
  --bg-input:      #fff5f5;
  --border-main:   #cc0000;
  --border-soft:   #ffaaaa;
  --border-mid:    #ff6666;
  --text-main:     #1a0000;
  --text-result:   #990000;
  --text-label:    #cc0000;
  --text-sub:      #444;
  --text-muted:    #aaa;
  --text-date:     #888;
  --btn-grad:      linear-gradient(45deg,#cc0000,#880000);
  --btn-hist:      linear-gradient(45deg,#cc0000,#990000);
  --btn-load:      linear-gradient(45deg,#cc0000,#880000);
  --btn-del:       rgba(200,0,0,0.12);
  --shadow-main:   rgba(200,0,0,0.25);
  --shadow-panel:  rgba(200,0,0,0.15);
  --shadow-result: rgba(200,0,0,0.12);
  --scrollbar:     #cc0000;
  --toggle-bg:     #ffdddd;
}

/* ======================================================
   BASE
====================================================== */
*{box-sizing:border-box;}
body{margin:0;padding:0;background:var(--bg-main);font-family:Consolas,monospace;color:var(--text-main);min-height:100vh;transition:background 0.4s,color 0.3s;}
body::before{content:"";position:fixed;width:100%;height:100%;background:radial-gradient(circle at top right,var(--bg-radial),transparent 40%);z-index:-1;pointer-events:none;}

/* ======================================================
   TOGGLE MODO
====================================================== */
#toggle-modo{
  position:fixed;top:50%;right:0;z-index:999;
  transform:translateY(-50%) rotate(90deg) translateX(30%);
  transform-origin:right center;
  background:var(--toggle-bg);border:1px solid var(--border-main);
  border-radius:8px 8px 0 0;padding:5px 12px;cursor:pointer;
  font-family:Consolas,monospace;font-size:11px;font-weight:bold;
  color:var(--text-label);transition:background 0.3s,box-shadow 0.3s;
  display:flex;align-items:center;gap:6px;width:auto;margin-top:0;
  box-shadow:-2px 0 10px var(--shadow-main);
}
#toggle-modo:hover{box-shadow:-2px 0 18px var(--shadow-main);background:rgba(255,0,0,0.18);transform:translateY(-50%) rotate(90deg) translateX(20%);}

/* ======================================================
   LOGIN
====================================================== */
#login{width:340px;margin:auto;margin-top:120px;display:flex;flex-direction:column;gap:15px;background:var(--bg-panel);padding:35px;border-radius:15px;border:1px solid var(--border-main);box-shadow:0 0 25px var(--shadow-main);}
h1{text-align:center;color:var(--text-label);text-shadow:0 0 10px var(--shadow-main);letter-spacing:2px;}
input{padding:14px;background:var(--bg-input);color:var(--text-main);border:1px solid var(--border-main);border-radius:8px;font-size:14px;font-family:Consolas,monospace;transition:0.3s;}
input:focus{outline:none;box-shadow:0 0 10px var(--shadow-main);}
button{width:100%;padding:14px;margin-top:15px;border:none;border-radius:8px;background:var(--btn-grad);color:white;font-weight:bold;cursor:pointer;transition:0.3s;font-size:15px;font-family:Consolas,monospace;}
button:hover{transform:scale(1.03);box-shadow:0 0 15px var(--shadow-main);}

/* ======================================================
   CONTENEDOR
====================================================== */
.contenedor{display:none;justify-content:center;gap:30px;padding:30px 20px;flex-wrap:wrap;align-items:flex-start;}

/* ======================================================
   PANEL IZQUIERDO
====================================================== */
.panel{width:340px;max-height:920px;overflow-y:auto;padding:25px;background:var(--bg-panel);border-radius:15px;border:1px solid var(--border-main);box-shadow:0 0 20px var(--shadow-panel);}
.panel::-webkit-scrollbar{width:8px;}
.panel::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:10px;}
label{display:block;margin-top:15px;margin-bottom:5px;color:var(--text-label);font-weight:bold;font-size:13px;}
select{width:100%;padding:12px;background:var(--bg-input);color:var(--text-main);border:1px solid var(--border-main);border-radius:8px;font-size:13px;font-family:Consolas,monospace;transition:0.3s;}
select:hover,select:focus{box-shadow:0 0 10px var(--shadow-main);outline:none;}

/* ======================================================
   RESULTADO (CENTRO)
====================================================== */
.resultado-wrap{display:flex;flex-direction:column;gap:16px;width:480px;}

/* BADGE GAMA */
.badge-gama{
  text-align:center;padding:14px 20px;border-radius:12px;font-size:22px;font-weight:bold;
  letter-spacing:3px;text-transform:uppercase;border:2px solid;transition:all 0.4s;
}
.gama-baja    {background:rgba(0,80,0,0.2);   border-color:#00cc44;color:#00cc44;text-shadow:0 0 10px #00cc44;}
.gama-media   {background:rgba(0,80,180,0.2); border-color:#3388ff;color:#3388ff;text-shadow:0 0 10px #3388ff;}
.gama-alta    {background:rgba(160,60,0,0.2); border-color:#ff8800;color:#ff8800;text-shadow:0 0 10px #ff8800;}
.gama-extrema {background:rgba(120,0,120,0.2);border-color:#cc44ff;color:#cc44ff;text-shadow:0 0 10px #cc44ff;}

/* COTIZACIÓN */
.cotizacion{background:var(--bg-panel);border:1px solid var(--border-main);border-radius:15px;padding:20px;box-shadow:0 0 20px var(--shadow-result);}
.cot-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:14px;color:var(--text-sub);}
.cot-row:last-child{border-bottom:none;}
.cot-label{color:var(--text-label);font-size:13px;}
.cot-total{font-size:22px;font-weight:bold;color:var(--text-result);text-shadow:0 0 8px var(--shadow-main);}
.cot-descuento{color:#00cc44;}

/* RESULTADO TEXTO */
.resultado{min-height:460px;background:var(--bg-panel2);border:1px solid var(--border-main);border-radius:15px;padding:25px;color:var(--text-result);white-space:pre-line;font-size:15px;box-shadow:0 0 25px var(--shadow-result);}

/* COMPAT */
.compat-ok   {background:rgba(0,80,0,0.3);  border:1px solid #00ff88;border-radius:8px;padding:10px 15px;margin-top:8px;color:#00ff88;font-size:13px;}
.compat-warn {background:rgba(120,60,0,0.3);border:1px solid #ffaa00;border-radius:8px;padding:10px 15px;margin-top:8px;color:#ffaa00;font-size:13px;}
.compat-error{background:rgba(120,0,0,0.3); border:1px solid #ff4444;border-radius:8px;padding:10px 15px;margin-top:8px;color:#ff4444;font-size:13px;}

/* ======================================================
   HISTORIAL (DERECHA)
====================================================== */
.historial-panel{width:300px;max-height:920px;overflow-y:auto;padding:22px;background:var(--bg-panel);border-radius:15px;border:1px solid var(--border-soft);box-shadow:0 0 20px var(--shadow-panel);}
.historial-panel::-webkit-scrollbar{width:8px;}
.historial-panel::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:10px;}
.historial-item{background:var(--bg-item);border:1px solid var(--border-soft);border-radius:8px;padding:12px;margin-bottom:10px;font-size:12px;color:var(--text-sub);transition:border-color 0.2s;}
.historial-item:hover{border-color:var(--border-main);}
.h-title{color:var(--text-label);font-weight:bold;margin-bottom:4px;font-size:13px;}
.h-fecha{color:var(--text-date);font-size:11px;margin-bottom:6px;}
.h-comp{color:var(--text-sub);font-size:11px;line-height:1.7;}
.historial-btns{display:flex;gap:6px;margin-top:8px;}
.btn-cargar{flex:1;padding:6px;margin-top:0;font-size:11px;background:var(--btn-load);}
.btn-borrar{width:32px;padding:6px;margin-top:0;font-size:11px;background:var(--btn-del);border:1px solid var(--border-soft);}
.btn-borrar:hover{background:rgba(120,0,0,0.6);}
.no-historial{color:var(--text-muted);font-size:13px;text-align:center;margin-top:30px;}
.btn-limpiar{background:var(--btn-hist);margin-top:8px;}

/* ======================================================
   RECOMENDADOR MODAL
====================================================== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.activo{display:flex;}
.modal-box{background:var(--bg-panel);border:2px solid var(--border-main);border-radius:18px;padding:35px 30px;width:420px;max-width:95vw;box-shadow:0 0 40px var(--shadow-main);text-align:center;}
.modal-box h2{color:var(--text-label);margin:0 0 8px;font-size:20px;letter-spacing:2px;}
.modal-box p{color:var(--text-sub);font-size:14px;margin:0 0 24px;}
.uso-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}
.uso-btn{padding:18px 10px;border:2px solid var(--border-soft);border-radius:12px;background:var(--bg-item);color:var(--text-main);cursor:pointer;font-family:Consolas,monospace;font-size:14px;font-weight:bold;transition:all 0.25s;margin-top:0;}
.uso-btn:hover{border-color:var(--border-main);background:rgba(255,0,0,0.15);box-shadow:0 0 15px var(--shadow-main);transform:scale(1.04);}
.uso-btn span{display:block;font-size:24px;margin-bottom:6px;}
.modal-cancelar{background:transparent;border:1px solid var(--border-soft);color:var(--text-muted);font-size:13px;margin-top:12px;}
.modal-cancelar:hover{background:rgba(255,0,0,0.08);}

/* ======================================================
   RESPONSIVE
====================================================== */
@media(max-width:1100px){
  .contenedor{flex-direction:column;align-items:center;}
  .resultado-wrap{width:90%;}
  .historial-panel{width:90%;}
}
</style>
</head>

<!-- ======================================================
     JAVASCRIPT
====================================================== -->
<script>

/* ======================================================
   MODO OSCURO / CLARO
====================================================== */
function toggleModo(){
  let html = document.documentElement;
  let actual = html.getAttribute("data-theme");
  let nuevo = actual === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", nuevo);
  document.getElementById("modo-icon").textContent  = nuevo === "dark" ? "☀️" : "🌙";
  document.getElementById("modo-label").textContent = nuevo === "dark" ? "MODO CLARO" : "MODO OSCURO";
  localStorage.setItem("gc_tema", nuevo);
}
(function(){
  let t = localStorage.getItem("gc_tema") || "dark";
  document.documentElement.setAttribute("data-theme", t);
  // íconos se setearán cuando el DOM cargue
  window.addEventListener("DOMContentLoaded",()=>{
    document.getElementById("modo-icon").textContent  = t === "dark" ? "☀️" : "🌙";
    document.getElementById("modo-label").textContent = t === "dark" ? "MODO CLARO" : "MODO OSCURO";
  });
})();

/* ======================================================
   DATOS DE COMPATIBILIDAD
====================================================== */
const cpuSocket={
  "Athlon 3000G":"AM4","Ryzen 3 2200G":"AM4","Ryzen 3 3200G":"AM4","Ryzen 3 4100":"AM4",
  "Ryzen 5 3600":"AM4","Ryzen 5 4600G":"AM4","Ryzen 5 5500":"AM4","Ryzen 5 5600X":"AM4","Ryzen 7 5700X":"AM4",
  "Ryzen 7 5800X3D":"AM4","Ryzen 7 7700X":"AM5","Ryzen 7 7800X3D":"AM5","Ryzen 9 7900X":"AM5","Ryzen 9 7950X":"AM5","Ryzen 9 9950X":"AM5",
  "Intel i3 10100F":"LGA1200","Intel i3 12100F":"LGA1700",
  "Intel i5 10400F":"LGA1200","Intel i5 12400F":"LGA1700","Intel i5 13400F":"LGA1700","Intel i5 14600K":"LGA1700",
  "Intel i7 12700K":"LGA1700","Intel i7 13700K":"LGA1700","Intel i7 14700K":"LGA1700","Intel i9 13900K":"LGA1700","Intel i9 14900K":"LGA1700"
};
const mbSocket={
  "A320M":"AM4","B450M":"AM4","B550 Gaming":"AM4","X570 AORUS":"AM4",
  "B650 Gaming Plus":"AM5","X670 AORUS Elite":"AM5",
  "H510M":"LGA1200","H610M":"LGA1700","B660M":"LGA1700","Z690 Gaming":"LGA1700","Z790 ROG STRIX":"LGA1700"
};
const mbRam={
  "A320M":"DDR4","B450M":"DDR4","B550 Gaming":"DDR4","X570 AORUS":"DDR4",
  "B650 Gaming Plus":"DDR5","X670 AORUS Elite":"DDR5",
  "H510M":"DDR4","H610M":"DDR4","B660M":"DDR4","Z690 Gaming":"DDR4","Z790 ROG STRIX":"DDR5"
};
const gpuWatts={
  "GT 1030":300,"GTX 1050 Ti":350,"GTX 1650":350,"GTX 1660 Super":450,
  "RTX 2060":500,"RTX 3050":450,"RTX 3060":550,"RTX 3060 Ti":600,"RTX 3070":650,
  "RTX 4060":550,"RTX 4060 Ti":600,"RTX 4070":650,"RTX 4070 Super":700,"RTX 4080":750,"RTX 4090":850,
  "RX 570":450,"RX 580":500,"RX 6400":350,
  "RX 6600":500,"RX 6700 XT":600,"RX 6750 XT":650,"RX 7600":550,
  "RX 7700 XT":650,"RX 7800 XT":700,"RX 7900 XT":750,"RX 7900 XTX":800
};
const fuenteWatts={
  "500W":500,"550W Bronze":550,"650W Bronze":650,"750W Gold":750,
  "850W Gold":850,"1000W Platinum":1000,"1200W Titanium":1200
};
const cpuHighTDP=["Ryzen 9 7900X","Ryzen 9 7950X","Ryzen 9 9950X","Intel i9 13900K","Intel i9 14900K","Intel i7 14700K"];

/* ======================================================
   COMPATIBILIDAD
====================================================== */
function verificarCompatibilidad(cpu,gpu,ram,mb,fuente){
  let errores=[],advertencias=[];
  if(cpu&&mb){
    let sc=cpuSocket[cpu],sm=mbSocket[mb];
    if(sc&&sm&&sc!==sm) errores.push("⛔ Socket incompatible: "+cpu+" usa "+sc+" pero "+mb+" es "+sm);
  }
  if(ram&&mb){
    let rt=ram.includes("DDR5")?"DDR5":"DDR4",mt=mbRam[mb];
    if(mt&&rt!==mt) errores.push("⛔ RAM incompatible: "+mb+" soporta "+mt+" pero seleccionaste "+rt);
    let sm=mbSocket[mb];
    if(rt==="DDR5"&&(sm==="AM4"||sm==="LGA1200")) errores.push("⛔ DDR5 no compatible con AM4/LGA1200");
  }
  if(gpu&&fuente){
    let wg=gpuWatts[gpu]||0,wf=fuenteWatts[fuente]||0,wn=wg+(cpuHighTDP.includes(cpu)?100:50);
    if(wf<wn) errores.push("⛔ Fuente insuficiente: "+gpu+" necesita ~"+wn+"W, tienes "+wf+"W");
    else if(wf<wn+100) advertencias.push("⚠️ Fuente ajustada: recomendado más margen para "+gpu);
  }
  if(cpu&&gpu){let c=detectarCuello(cpu,gpu);if(c)advertencias.push("⚠️ "+c);}
  if(ram&&(ram.startsWith("4GB")||ram.startsWith("8GB"))) advertencias.push("⚠️ RAM baja: menos de 16GB puede limitar juegos modernos");
  return{errores,advertencias};
}
function detectarCuello(cpu,gpu){
  const gg={"GT 1030":1,"GTX 1050 Ti":2,"GTX 1650":2,"GTX 1660 Super":3,"RTX 2060":3,"RTX 3050":3,"RTX 3060":4,"RTX 3060 Ti":4,"RTX 3070":5,"RTX 4060":4,"RTX 4060 Ti":5,"RTX 4070":5,"RTX 4070 Super":6,"RTX 4080":7,"RTX 4090":8,"RX 570":2,"RX 580":3,"RX 6400":2,"RX 6600":3,"RX 6700 XT":4,"RX 6750 XT":5,"RX 7600":4,"RX 7700 XT":5,"RX 7800 XT":5,"RX 7900 XT":6,"RX 7900 XTX":7};
  const cg={"Athlon 3000G":1,"Ryzen 3 2200G":1,"Ryzen 3 3200G":1,"Ryzen 3 4100":2,"Ryzen 5 3600":3,"Ryzen 5 4600G":3,"Ryzen 5 5500":3,"Ryzen 5 5600X":4,"Ryzen 7 5700X":5,"Ryzen 7 5800X3D":6,"Ryzen 7 7700X":5,"Ryzen 7 7800X3D":7,"Ryzen 9 7900X":6,"Ryzen 9 7950X":7,"Ryzen 9 9950X":8,"Intel i3 10100F":2,"Intel i3 12100F":3,"Intel i5 10400F":3,"Intel i5 12400F":4,"Intel i5 13400F":4,"Intel i5 14600K":5,"Intel i7 12700K":5,"Intel i7 13700K":6,"Intel i7 14700K":6,"Intel i9 13900K":7,"Intel i9 14900K":7};
  let gc=cg[cpu]||3,gpuN=gg[gpu]||3;
  if(gpuN-gc>=3)return"Posible cuello de botella en CPU: el procesador podría limitar la GPU";
  if(gc-gpuN>=3)return"CPU sobredimensionado: considera una GPU más potente";
  return null;
}
function actualizarCompatLive(){
  let cpu=v("cpu"),gpu=v("gpu"),ram=v("ram"),mb=v("mb"),fuente=v("fuente");
  let div=document.getElementById("compat-live");
  if(!cpu&&!gpu&&!ram&&!mb&&!fuente){div.innerHTML="";return;}
  let{errores,advertencias}=verificarCompatibilidad(cpu,gpu,ram,mb,fuente);
  let html="";
  errores.forEach(e=>html+='<div class="compat-error">'+e+'</div>');
  advertencias.forEach(a=>html+='<div class="compat-warn">'+a+'</div>');
  if(!errores.length&&!advertencias.length&&cpu&&gpu&&ram&&mb&&fuente)
    html='<div class="compat-ok">✅ Todos los componentes son compatibles</div>';
  div.innerHTML=html;
}
["cpu","gpu","ram","mb","fuente","ssd"].forEach(id=>document.getElementById(id).addEventListener("change",actualizarCompatLive));

/* ======================================================

function calcularGama(cpu,gpu){
  const cg={"Athlon 3000G":1,"Ryzen 3 2200G":1,"Ryzen 3 3200G":1,"Ryzen 3 4100":2,"Ryzen 5 3600":3,"Ryzen 5 4600G":3,"Ryzen 5 5500":3,"Ryzen 5 5600X":4,"Ryzen 7 5700X":5,"Ryzen 7 5800X3D":6,"Ryzen 7 7700X":5,"Ryzen 7 7800X3D":7,"Ryzen 9 7900X":6,"Ryzen 9 7950X":7,"Ryzen 9 9950X":8,"Intel i3 10100F":2,"Intel i3 12100F":3,"Intel i5 10400F":3,"Intel i5 12400F":4,"Intel i5 13400F":4,"Intel i5 14600K":5,"Intel i7 12700K":5,"Intel i7 13700K":6,"Intel i7 14700K":6,"Intel i9 13900K":7,"Intel i9 14900K":7};
  const gg={"GT 1030":1,"GTX 1050 Ti":2,"GTX 1650":2,"GTX 1660 Super":3,"RTX 2060":3,"RTX 3050":3,"RTX 3060":4,"RTX 3060 Ti":4,"RTX 3070":5,"RTX 4060":4,"RTX 4060 Ti":5,"RTX 4070":5,"RTX 4070 Super":6,"RTX 4080":7,"RTX 4090":8,"RX 570":2,"RX 580":3,"RX 6400":2,"RX 6600":3,"RX 6700 XT":4,"RX 6750 XT":5,"RX 7600":4,"RX 7700 XT":5,"RX 7800 XT":5,"RX 7900 XT":6,"RX 7900 XTX":7};
  let score=Math.round(((cg[cpu]||3)+(gg[gpu]||3))/2);
  if(score<=2)return{label:"⚡ GAMA BAJA",   cls:"gama-baja"};
  if(score<=4)return{label:"🔵 GAMA MEDIA",  cls:"gama-media"};
  if(score<=6)return{label:"🔥 GAMA ALTA",   cls:"gama-alta"};
              return{label:"💜 GAMA EXTREMA", cls:"gama-extrema"};
}

/* ======================================================
   COTIZACIÓN
====================================================== */
function mostrarCotizacion(precioBase){
  let subtotal  = precioBase;
  let descuento = Math.round(subtotal*0.05);
  let subConDesc= subtotal - descuento;
  let iva       = Math.round(subConDesc*0.16);
  let total     = subConDesc + iva;
  document.getElementById("cot-sub").textContent   = "$"+subtotal.toLocaleString("es-MX")+" MXN";
  document.getElementById("cot-desc").textContent  = "-$"+descuento.toLocaleString("es-MX")+" MXN";
  document.getElementById("cot-iva").textContent   = "+$"+iva.toLocaleString("es-MX")+" MXN";
  document.getElementById("cot-total").textContent = "$"+total.toLocaleString("es-MX")+" MXN";
  document.getElementById("cotizacion").style.display="block";
  return total;
}

function v(id){return document.getElementById(id).value;}
function armarPC(){
  let cpu=v("cpu"),gpu=v("gpu"),ram=v("ram"),mb=v("mb"),fuente=v("fuente"),ssd=v("ssd");
  if(!cpu||!gpu||!ram||!mb||!fuente||!ssd){alert("Selecciona todos los componentes");return;}
  let{errores,advertencias}=verificarCompatibilidad(cpu,gpu,ram,mb,fuente);
  if(errores.length){alert("⛔ ERRORES DE COMPATIBILIDAD:\n\n"+errores.join("\n")+"\n\nCorrige los errores antes de continuar.");return;}

  let precioBase = Math.floor(Math.random()*30000)+10000;
  let consumo  = Math.floor(Math.random()*500)+200;
  let valorant = Math.floor(Math.random()*250)+120;
  let warzone  = Math.floor(Math.random()*120)+60;
  let fortnite = Math.floor(Math.random()*180)+90;
  let tempCPU  = Math.floor(Math.random()*10)+60;
  let tempGPU  = Math.floor(Math.random()*10)+70;

  // Gama
  let gama=calcularGama(cpu,gpu);

  badge.className="badge-gama "+gama.cls;

  let totalFinal=mostrarCotizacion(precioBase);

  let compatTexto=advertencias.length===0?"COMPONENTES COMPATIBLES ✅":"ADVERTENCIAS:\n"+advertencias.join("\n");

  let resultado=
`===== PC GAMER =====

CPU:       ${cpu}
GPU:       ${gpu}
RAM:       ${ram}

Fuente:    ${fuente}
SSD:       ${ssd}

===== FPS ESTIMADOS =====

Valorant:  ${valorant} FPS
Warzone:   ${warzone} FPS
Fortnite:  ${fortnite} FPS

Consumo:   ${consumo}W
CPU Temp:  ${tempCPU}°C
GPU Temp:  ${tempGPU}°C

===== COMPATIBILIDAD =====

${compatTexto}`;

  document.getElementById("resultado").innerText=resultado;
  guardarHistorial({cpu,gpu,ram,mb,fuente,ssd,precio:totalFinal,valorant,warzone,fortnite,advertencias,gama:gama.label});
}

function guardarHistorial(datos){
  let h=JSON.parse(localStorage.getItem("historial_gc")||"[]");
  datos.fecha=new Date().toLocaleString("es-MX");
  datos.id=Date.now();
  h.unshift(datos);
  if(h.length>10)h=h.slice(0,10);
  localStorage.setItem("historial_gc",JSON.stringify(h));
  renderHistorial();
}
function renderHistorial(){
  let h=JSON.parse(localStorage.getItem("historial_gc")||"[]");
  let div=document.getElementById("historial-lista");
  if(!h.length){div.innerHTML='<p class="no-historial">Sin configuraciones guardadas.</p>';return;}
  div.innerHTML=h.map((x,i)=>`
    <div class="historial-item">
      <div class="h-title">PC #${h.length-i} ${x.gama?'<span style="font-size:10px;color:#aaa;">'+x.gama+'</span>':''}</div>
      <div class="h-fecha">${x.fecha}</div>
      <div class="h-comp">
        CPU: ${x.cpu}<br>GPU: ${x.gpu}<br>RAM: ${x.ram}<br>
        <span style="color:#ff6666;">$${x.precio.toLocaleString("es-MX")} MXN</span><br>
        <span style="color:#44ff88;">Val:${x.valorant} WZ:${x.warzone} FN:${x.fortnite} fps</span>
        ${x.advertencias&&x.advertencias.length?'<br><span style="color:#ffaa00;">⚠️ '+x.advertencias.length+' advertencia(s)</span>':''}
      </div>
      <div class="historial-btns">
        <button class="btn-cargar" onclick="cargarConfig(${i})">↩ Cargar</button>
        <button class="btn-borrar" onclick="borrarConfig(${i})">🗑</button>
      </div>
    </div>`).join("");
}
function cargarConfig(i){
  let h=JSON.parse(localStorage.getItem("historial_gc")||"[]"),x=h[i];
  if(!x)return;
  setSelectValue("cpu",x.cpu);setSelectValue("gpu",x.gpu);setSelectValue("ram",x.ram);
  setSelectValue("mb",x.mb);setSelectValue("fuente",x.fuente);setSelectValue("ssd",x.ssd);
  actualizarCompatLive();
}
function setSelectValue(id,val){
  let s=document.getElementById(id);
  for(let o of s.options){if(o.text===val){s.value=o.value;return;}}
}
function borrarConfig(i){
  let h=JSON.parse(localStorage.getItem("historial_gc")||"[]");
  h.splice(i,1);localStorage.setItem("historial_gc",JSON.stringify(h));renderHistorial();
}
function limpiarHistorial(){
  if(confirm("¿Borrar todo el historial?")){localStorage.removeItem("historial_gc");renderHistorial();}
}

/* ======================================================
   LOGIN / REGISTRO
====================================================== */
if(!localStorage.getItem("usuarios"))
  localStorage.setItem("usuarios",JSON.stringify([{nombre:"admin",password:"1234"}]));

function registrarUsuario(){
  let nu=prompt("Crea un usuario"),np=prompt("Crea una contraseña");
  if(nu===null||np===null){alert("Registro cancelado");return;}
  nu=nu.trim();np=np.trim();
  if(!nu||!np){alert("No puedes dejar campos vacíos");return;}
  if(!/^[a-zA-Z0-9]+$/.test(nu)){alert("El usuario NO puede tener símbolos");return;}
  let u=JSON.parse(localStorage.getItem("usuarios"))||[];
  if(u.some(x=>x.nombre===nu)){alert("Ese usuario ya existe");return;}
  u.push({nombre:nu,password:np});
  localStorage.setItem("usuarios",JSON.stringify(u));
  alert("Usuario registrado correctamente");
}
function iniciarSesion(){
  let usuario=document.getElementById("usuario").value;
  let password=document.getElementById("password").value;
  let u=JSON.parse(localStorage.getItem("usuarios"))||[];
  let ok=u.find(x=>x.nombre===usuario&&x.password===password);
  if(ok){
    alert("Bienvenido "+usuario);
    document.getElementById("login").style.display="none";
    document.getElementById("sistema").style.display="flex";
    renderHistorial();
  }else{alert("Usuario o contraseña incorrectos");}
}
function cerrarSistema(){location.reload();}
